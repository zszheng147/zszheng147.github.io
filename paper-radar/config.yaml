# Multi-topic AI paper radar configuration.
# Topics are evaluated in this order.  Once a paper enters one topic, it is
# reserved there and cannot appear in a later topic.

schedule:
  timezone: "America/Los_Angeles"
  weekdays_only: true
  run_hour: 8
  run_until_hour: 13

arxiv:
  categories:
    - cs.CL
    - cs.LG
    - cs.AI
    - cs.CV
    - cs.MM
    - cs.SD
    - cs.RO
    - stat.ML
    - eess.AS
  lookback_days: 3
  max_results: 1200
  user_agent: "ai-paper-radar/0.2 mailto:you@example.com"

# Hard exclusions shared by every topic. These remove AI-for-science and other
# applied-science papers even when they contain hot AI terms such as foundation
# model, multimodal, reasoning, agent, diffusion, or world model.
global_exclude_terms:
  - ai for science
  - ai4science
  - scientific discovery
  - scientific machine learning
  - scientific foundation model
  - biology
  - biomedical
  - clinical
  - medical
  - radiology
  - pathology
  - protein
  - proteins
  - molecule
  - molecules
  - molecular
  - drug discovery
  - drug design
  - chemistry
  - chemical
  - genome
  - genomics
  - dna
  - rna
  - materials science
  - material discovery
  - materials discovery
  - crystal
  - catalyst
  - battery
  - quantum
  - physics
  - climate
  - weather forecasting
  - earth observation
  - remote sensing
  - satellite
  - wireless
  - packet routing
  - traffic signal
  - power grid
  - antenna
  - q-bio
  - cond-mat
  - astro-ph

topics:
  # 1) 12 papers: RL + language/multimodal language models.  Audio-related
  # work is a hard exclusion, rather than merely receiving a lower score.
  - id: rl_llm_mllm
    title: "RL + LLM/MLLM"
    ranking:
      top_k: 12
      score_threshold: 4.0
      require_all_group_sets:
        - [rl_core, preference_alignment, verifiable_reasoning, agentic_rl]
        - [llm_core, mllm_vlm]
      exclude_any_groups: [audio_related]
      exclude_terms:
        - audio
        - speech
        - music
        - acoustic
        - spoken
        - vocal
        - voice
        - text-to-speech
        - automatic speech recognition
        - speech recognition
        - speech synthesis
      groups:
        rl_core:
          weight: 2.5
          terms:
            - reinforcement learning
            - rl-based
            - rl training
            - rl fine-tuning
            - rl post-training
            - policy optimization
            - policy gradient
            - actor-critic
            - ppo
            - reinforce
            - rloo
            - remax
            - dapo
            - dcpo
            - offline rl
            - online rl
            - reward shaping
            - advantage normalization
        preference_alignment:
          weight: 3.0
          terms:
            - rlhf
            - rlaif
            - dpo
            - ipo
            - kto
            - orpo
            - simpo
            - cpo
            - rrhf
            - reward model
            - reward modeling
            - preference optimization
            - preference learning
            - preference tuning
            - human preference
            - human feedback
            - direct preference optimization
            - constitutional ai
            - ai feedback
        verifiable_reasoning:
          weight: 3.0
          terms:
            - grpo
            - rlvr
            - reinforcement learning from verifiable rewards
            - reinforcement learning with verifiable rewards
            - verifiable reward
            - rule-based reward
            - process reward
            - outcome reward
            - process reward model
            - outcome reward model
        agentic_rl:
          weight: 2.5
          terms:
            - agentic reinforcement learning
            - reinforcement learning for agents
            - reinforcement learning agents
            - rl agent
            - environment reward
            - interaction reward
            - trajectory reward
            - multi-turn reward
            - self-play
        llm_core:
          weight: 2.5
          terms:
            - large language model
            - large language models
            - llm
            - llms
            - language model
            - language models
            - foundation model
            - foundation models
            - generative ai
            - instruction tuning
            - reasoning model
            - large reasoning model
        mllm_vlm:
          weight: 2.2
          terms:
            - multimodal large language model
            - multimodal large language models
            - large multimodal model
            - mllm
            - mllms
            - vision-language model
            - vision language model
            - visual-language model
            - vlm
            - vlms
            - image-text
            - video-language
            - visual instruction tuning
        audio_related:
          weight: 0.0
          terms:
            - audio language model
            - speech language model
            - speech-language model
            - spoken language model
            - audio-text
            - speech instruction tuning
            - audio instruction tuning
            - speech recognition
            - text-to-speech
            - music generation
      negative_terms:
        - wireless
        - packet routing
        - traffic signal
        - power grid
        - protein
        - molecule
        - quantum
        - antenna

  # 2) 5 papers: speech, audio, or music.  This is a separate modality track.
  - id: speech_audio_music
    title: "Speech-Audio-Music"
    ranking:
      top_k: 5
      score_threshold: 4.0
      require_all_group_sets:
