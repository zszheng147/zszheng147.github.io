  # 3) 5 papers: broad, currently active AI directions.  The radar ranks by
  # strong frontier-AI signals, while the ordered topic logic prevents overlap
  # with the two focused tracks above.
  - id: hottest_ai
    title: "AI paper of the day"
    ranking:
      top_k: 5
      score_threshold: 3.0
      require_one_group:
        - foundation_models
        - agents_reasoning
        - generative_world_models
        - embodied_ai
        - ai_systems
      groups:
        foundation_models:
          weight: 2.5
          terms:
            - large language model
            - llm
            - foundation model
            - multimodal
            - vision-language model
            - mllm
            - reasoning model
        agents_reasoning:
          weight: 2.5
          terms:
            - ai agent
            - llm agent
            - agentic
            - tool use
            - tool-use
            - web agent
            - code agent
            - multi-agent
            - test-time scaling
            - chain-of-thought
            - mathematical reasoning
            - theorem proving
        generative_world_models:
