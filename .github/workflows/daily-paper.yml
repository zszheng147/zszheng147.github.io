name: Daily Paper Radar

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force rerun even if today already ran"
        type: boolean
        default: false
  schedule:
    # GitHub Actions cron is UTC-only. These two times cover 8 AM
    # America/Los_Angeles across daylight saving changes; the script's own
    # local-time guard lets only the matching run proceed.
    - cron: "0 15 * * 1-5"
    - cron: "0 16 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-paper-radar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: paper-radar/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r paper-radar/requirements.txt

      - name: Generate daily paper page
        env:
          FORCE_RUN: ${{ inputs.force || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          ARGS=""
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$FORCE_RUN" = "true" ]; then
              ARGS="--force"
            else
              ARGS="--manual"
            fi
          fi

          python paper-radar/paper_radar.py \
            --config paper-radar/config.yaml \
            --state paper-radar/state/seen.json \
            --html-dir daily-paper \
            $ARGS

      - name: Commit updated digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily paper radar"
          file_pattern: "daily-paper/*.html paper-radar/state/seen.json"
